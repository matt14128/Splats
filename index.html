<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Splats</title>
	<style>
		:root {
			--bg: #0f172a;
			--panel: rgba(255, 255, 255, 0.08);
			--panel-border: rgba(255, 255, 255, 0.14);
			--text: #e2e8f0;
			--muted: #94a3b8;
			--accent: #38bdf8;
		}

		* { box-sizing: border-box; }

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
			font-family: Arial, Helvetica, sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at top, rgba(56, 189, 248, 0.22), transparent 35%),
				linear-gradient(180deg, #0f172a 0%, #111827 100%);
		}

		.container {
			width: min(100%, 760px);
			padding: clamp(20px, 4vw, 40px);
			border: 1px solid var(--panel-border);
			border-radius: 24px;
			background: var(--panel);
			box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
			backdrop-filter: blur(12px);
		}

		header {
			margin-bottom: 28px;
			display: grid;
			gap: 12px;
		}

		h1 {
			margin: 0;
			font-size: clamp(2rem, 5vw, 3.25rem);
			line-height: 1.05;
		}

		p {
			margin: 0;
			color: var(--muted);
			max-width: 60ch;
		}
        p a {
            color: var(--accent);
            text-decoration: none;
        }

		.links {
			list-style: none;
			padding: 0;
			margin: 0;
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
			gap: 14px;
		}

		.links a {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			padding: 16px 18px;
			border-radius: 16px;
			color: var(--text);
			text-decoration: none;
			background: rgba(255, 255, 255, 0.06);
			border: 1px solid rgba(255, 255, 255, 0.08);
			transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
		}

		.links a:hover,
		.links a:focus-visible {
			transform: translateY(-2px);
			outline: none;
			border-color: rgba(56, 189, 248, 0.65);
			background: rgba(56, 189, 248, 0.12);
		}

		.label {
			font-weight: 700;
		}

		.arrow {
			color: var(--accent);
			font-size: 1.2rem;
			flex: none;
		}

		.footer {
			margin-top: 24px;
			color: var(--muted);
			font-size: 0.95rem;
		}

		@media (max-width: 480px) {
			body { padding: 14px; }
			.container { border-radius: 18px; }
			.links a { padding: 14px 16px; }
		}
	</style>
</head>
<body>
	<main class="container">
		<header>
			<h1>Splats</h1>
			<p>A few splats to demo in VR.</p>
		</header>

		<ul class="links">
			<li><a href="bertscan-full.html"><span class="label">Full-quality splat</span><span class="arrow">↗</span></a></li>
			<li><a href="hillcrest.html"><span class="label">Hillcrest splat</span><span class="arrow">↗</span></a></li>
			<li><a href="LSLBoilerRoom_V2_compressed60.html"><span class="label">LSL Boiler Room V2 Compressed 60%</span><span class="arrow">↗</span></a></li>
		</ul>
            <br/>
			<p><a href="splat-converter/index.html"><span class="label">Splat Converter</span><span class="arrow">↗</span></a></p>

	</main>
</body>
</html>
